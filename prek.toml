exclude = "(^external/|^build|^out/)"

[[repos]]
repo = "builtin"
hooks = [
    { id = "trailing-whitespace" },
    { id = "end-of-file-fixer" },
    { id = "check-yaml" },
    { id = "check-toml" },
    { id = "check-json" },
    { id = "check-merge-conflict" },
    { id = "check-added-large-files" },
]

[[repos]]
repo = "local"

[[repos.hooks]]
id = "clang-format"
name = "clang-format (cmake lint.cmake)"
entry = "cmake -D FIX=YES -P cmake/lint.cmake"
language = "system"
pass_filenames = false
files = '\.(cpp|hpp|h)$'
