exclude = "(^external/|^build|^out/)"

[[repos]]
repo = "builtin"
hooks = [
    { id = "trailing-whitespace" },
    { id = "end-of-file-fixer" },
    { id = "check-yaml" },
    { id = "check-toml" },
    { id = "check-json" },
    { id = "check-merge-conflict" },
    { id = "check-added-large-files" },
]

[[repos]]
repo = "local"

[[repos.hooks]]
id = "clang-format"
name = "clang-format (cmake lint.cmake)"
entry = "cmake -D FIX=YES -P cmake/lint.cmake"
language = "system"
pass_filenames = false
files = '\.(cpp|hpp|h)$'

[[repos.hooks]]
id = "build-dev"
name = "Build (dev preset)"
entry = "bash -c 'cmake --preset dev && cmake --build build'"
language = "system"
stages = ["pre-commit"]
always_run = true
pass_filenames = false

[[repos.hooks]]
id = "build-test-asan"
name = "Build and test (asan preset)"
entry = "bash -c 'cmake --preset asan && cmake --build build-asan && ctest --test-dir build-asan --output-on-failure'"
language = "system"
stages = ["pre-commit"]
always_run = true
pass_filenames = false
